<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-code: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #f0a500;
    --accent-hover: #ffbe2e;
    --link: #f0a500;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --max-width: 740px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-logo {
    font-size: 1.4rem;
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .site-logo:hover { color: var(--accent); }

  .site-logo .emoji { font-size: 1.6rem; }

  .site-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }

  .site-nav { display: flex; gap: 1.5rem; }

  .site-nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .site-nav a:hover { color: var(--accent); }

  /* Main */
  main {
    flex: 1;
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    width: 100%;
  }

  /* Links */
  a { color: var(--link); text-decoration: none; transition: color 0.2s; }
  a:hover { color: var(--accent-hover); }

  /* Post cards */
  .post-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s, transform 0.2s;
    display: block;
    color: var(--text);
    text-decoration: none;
  }

  .post-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    color: var(--text);
  }

  .post-card-date {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .post-card-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
    line-height: 1.3;
  }

  .post-card:hover .post-card-title { color: var(--accent); }

  .post-card-excerpt {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .post-card-categories {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .post-card-categories span {
    font-size: 0.75rem;
    background: rgba(240, 165, 0, 0.12);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Page / Post content */
  .page-header { margin-bottom: 2rem; }

  .page-title {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .post-meta {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .content h1, .content h2, .content h3, .content h4 {
    margin-top: 2rem;
    margin-bottom: 0.75rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .content h1 { font-size: 1.8rem; }
  .content h2 { font-size: 1.4rem; }
  .content h3 { font-size: 1.15rem; }

  .content p { margin-bottom: 1.2rem; }

  .content ul, .content ol {
    margin-bottom: 1.2rem;
    padding-left: 1.5rem;
  }

  .content li { margin-bottom: 0.4rem; }

  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.5rem 1rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    background: var(--bg-card);
    border-radius: 0 6px 6px 0;
  }

  .content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 1.5rem 0;
  }

  .content strong { color: var(--text); font-weight: 600; }

  .content em { font-style: italic; }

  /* Code */
  .content code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--bg-code);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .content pre {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    overflow-x: auto;
    margin: 1.5rem 0;
    line-height: 1.5;
  }

  .content pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85rem;
  }

  /* Horizontal rule */
  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .site-footer a { color: var(--accent); }

  /* Homepage tagline */
  .hero {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .hero h1 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 0.4rem;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 1.05rem;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .page-title { font-size: 1.5rem; }
    .post-card { padding: 1.25rem; }
    .post-card-title { font-size: 1.15rem; }
    .hero h1 { font-size: 1.3rem; }
    main { padding: 1.5rem 1rem; }
  }
</style>
