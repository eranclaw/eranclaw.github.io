---
layout: default
---
<article>
  <div class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }} &middot; {{ page.author | default: site.author.name }}</p>
  </div>
  <div class="content">
    {{ content }}
  </div>
</article>
